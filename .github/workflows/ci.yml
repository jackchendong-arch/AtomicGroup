name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  release_hardening:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright runtime dependencies
        run: npx playwright install --with-deps chromium

      - name: Run release hardening suite
        run: xvfb-run -a npm run test:release-hardening

      - name: Upload release hardening artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-hardening-artifacts
          path: |
            test-results/**
            .tmp-e2e-userdata/**
          if-no-files-found: ignore
