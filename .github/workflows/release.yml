name: Release Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Version tag to build and publish, for example v1.0.0
        required: true
        type: string
      target_commitish:
        description: Branch, tag, or commit SHA to tag when manually dispatching
        required: false
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref_name || inputs.release_tag }}
  cancel-in-progress: false

jobs:
  prepare_release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      target_commitish: ${{ steps.resolve.outputs.target_commitish }}
    steps:
      - name: Resolve release inputs
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_TARGET_COMMITISH: ${{ inputs.target_commitish }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "release_tag=$INPUT_RELEASE_TAG" >> "$GITHUB_OUTPUT"
            echo "target_commitish=${INPUT_TARGET_COMMITISH:-$GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "target_commitish=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.release_tag }}
          target_commitish: ${{ steps.resolve.outputs.target_commitish }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_windows:
    needs: prepare_release
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare_release.outputs.release_tag }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Validate release tag
        shell: bash
        run: |
          expected="v$(node -p "require('./package.json').version")"
          if [ "$RELEASE_TAG" != "$expected" ]; then
            echo "Release tag $RELEASE_TAG does not match package version $expected." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright runtime dependencies
        run: npx playwright install chromium

      - name: Run release hardening suite
        shell: bash
        run: |
          mkdir -p ci-artifacts
          set -o pipefail
          npm run test:release-hardening 2>&1 | tee ci-artifacts/release-hardening.log

      - name: Upload release hardening artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-hardening-artifacts-${{ env.RELEASE_TAG }}
          path: |
            ci-artifacts/**
            test-results/**
            .tmp-e2e-userdata/**
          if-no-files-found: ignore

      - name: Build Windows installer
        run: npm run dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ env.RELEASE_TAG }}
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
